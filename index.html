<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TaeBank - Private Wealth Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Prompt', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        /* --- DYNAMIC PRESTIGE THEME VARIABLES --- */
        :root {
            --bg-deep: #000000;
            --theme-primary: #D4AF37; /* Default Gold */
            --theme-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --theme-glow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        body {
            background-color: var(--bg-deep);
            color: white;
            height: 100dvh; 
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; 
        }

        /* --- THEME HELPER CLASSES --- */
        .text-theme { color: var(--theme-primary); }
        .text-theme-grad {
            background: var(--theme-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0px 0px 25px var(--theme-primary);
        }
        .bg-theme { background-color: var(--theme-primary); }
        .border-theme { border-color: var(--theme-primary); }
        .shadow-theme { box-shadow: var(--theme-glow); }
        
        /* Ambient Glow & Flares */
        .ambient-glow {
            background-color: var(--theme-primary);
            box-shadow: 0 0 150px 70px var(--theme-primary);
            transition: all 1s ease;
        }

        /* --- KEYPAD (TacTile Look) --- */
        .key-btn {
            width: 78px; height: 78px;
            border-radius: 50%;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 300; font-family: 'Outfit', sans-serif;
            color: rgba(255,255,255,0.9);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .key-btn:active {
            background: var(--theme-primary);
            color: #000;
            border-color: var(--theme-primary);
            transform: scale(0.9) translateY(3px);
            box-shadow: 0 0 25px var(--theme-primary);
        }

        /* PIN Dot (Futuristic Glow) */
        .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #333; transition: 0.3s; }
        .pin-dot.active { background: var(--theme-primary); border-color: var(--theme-primary); transform: scale(1.1); box-shadow: var(--theme-glow); }

        /* --- SCANNER (Holographic Look) --- */
        .scan-line {
            width: 100%; height: 2px;
            background: var(--theme-primary);
            box-shadow: 0 0 15px var(--theme-primary);
            position: absolute; top: 0;
            animation: scanMove 1.5s ease-in-out infinite;
        }
        @keyframes scanMove { 0% { top: 0; opacity: 0; } 40% { opacity: 1; } 60% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

        /* --- PRESTIGE CARD (Heavy Glass & Aura) --- */
        .premium-card {
            aspect-ratio: 1.586/1;
            background: linear-gradient(145deg, rgba(30, 30, 30, 0.6) 0%, rgba(0, 0, 0, 0.9) 100%);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: border-color 0.8s ease;
        }
        /* Dynamic Card Border (Overrides Tailwind) */
        .card-border-glow { border-color: var(--theme-primary) !important; box-shadow: var(--theme-glow); }
        
        /* Moving Card Shine (Foil Effect) */
        .premium-card::after {
            content: ''; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%;
            background: linear-gradient(60deg, transparent 40%, rgba(255,255,255,0.05) 50%, transparent 60%);
            opacity: var(--tw-bg-opacity, 0.4);
            color: var(--theme-primary); /* JS will use this */
            transform: rotate(45deg); pointer-events: none;
            animation: shineCard 10s infinite;
        }
        @keyframes shineCard { 0% { transform: translateX(-100%) rotate(45deg); } 15% { transform: translateX(100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }

        /* --- GENERAL --- */
        .glass-sheet {
            background: rgba(10, 10, 12, 0.98);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-radius: 36px 36px 0 0;
            box-shadow: 0 -15px 60px rgba(0,0,0,0.8);
        }

        .fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(40px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body class="flex items-center justify-center">

    <div id="dynamicFlare" class="ambient-glow absolute top-[-10%] right-[-10%] w-[10px] h-[10px] rounded-full opacity-10 transition-all duration-1000"></div>

    <div class="w-full h-full max-w-md mx-auto relative overflow-hidden bg-black flex flex-col">

        <div id="loginScreen" class="absolute inset-0 z-30 flex flex-col justify-between bg-black transition-all duration-700">
            
            <div class="flex-1 flex flex-col items-center justify-center pb-8 min-h-[40%]">
                <div class="relative w-28 h-28 mb-8 flex items-center justify-center">
                    <div id="loginLogoGlow" class="absolute inset-0 rounded-full border border-theme opacity-30 animate-ping shadow-theme"></div>
                    <div id="loginLogoBorder" class="absolute inset-2 rounded-full border border-theme opacity-50"></div>
                    <i class="fas fa-shield-halved text-5xl text-theme-grad drop-shadow-[0_0_20px_rgba(255,255,255,0.1)]"></i>
                </div>
                
                <h1 class="text-3xl font-light text-white tracking-[6px] uppercase">TAE<span class="text-theme-grad font-bold">BANK</span></h1>
                <p class="text-[10px] text-[#444] uppercase tracking-[4px] mt-3 font-medium">Asset Access Portal</p>

                <div class="flex gap-5 mt-12">
                    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
                    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
                </div>
            </div>

            <div class="w-full max-w-[340px] mx-auto pb-10 px-6">
                <div class="grid grid-cols-3 gap-x-6 gap-y-5 mb-8 justify-items-center">
                    <div class="key-btn" onclick="pressKey('1')">1</div>
                    <div class="key-btn" onclick="pressKey('2')">2</div>
                    <div class="key-btn" onclick="pressKey('3')">3</div>
                    <div class="key-btn" onclick="pressKey('4')">4</div>
                    <div class="key-btn" onclick="pressKey('5')">5</div>
                    <div class="key-btn" onclick="pressKey('6')">6</div>
                    <div class="key-btn" onclick="pressKey('7')">7</div>
                    <div class="key-btn" onclick="pressKey('8')">8</div>
                    <div class="key-btn" onclick="pressKey('9')">9</div>
                    
                    <div class="w-[78px]"></div> <div class="key-btn" onclick="pressKey('0')">0</div>
                    <div class="key-btn border-none bg-transparent text-red-500/80 shadow-none active:bg-transparent active:scale-90" onclick="deleteKey()">
                        <i class="fas fa-backspace text-xl"></i>
                    </div>
                </div>
                
                <p class="text-center text-[9px] text-[#333] uppercase tracking-wider font-semibold">
                    พัฒนาโดย พระมหาจักรภัทร คมฺภีรญาณเมธี
                </p>
            </div>
        </div>

        <div id="bioScan" class="absolute inset-0 z-40 bg-black/98 flex flex-col items-center justify-center hidden">
            <div class="relative w-36 h-36 border border-theme shadow-theme rounded-2xl overflow-hidden flex items-center justify-center bg-theme" style="--tw-bg-opacity: 0.05;">
                <i class="fas fa-fingerprint text-6xl text-theme opacity-80"></i>
                <div class="scan-line"></div>
                <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-theme rounded-tl"></div>
                <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-theme rounded-tr"></div>
                <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-theme rounded-bl"></div>
                <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-theme rounded-br"></div>
            </div>
            <p class="mt-8 font-light text-theme tracking-[4px] text-xs animate-pulse opacity-90">VERIFYING STATUS...</p>
        </div>

        <div id="dashboardScreen" class="hidden w-full h-full flex flex-col relative z-20 mx-auto">
            
            <div class="pt-14 px-8 pb-4 flex justify-between items-end">
                <div>
                    <p class="text-theme text-[10px] font-medium tracking-wider mb-1 opacity-90 transition-colors duration-700">PRIVATE BANKING</p>
                    <h2 id="userNick" class="text-3xl font-light text-white leading-tight font-outfit">...</h2>
                </div>
                <div onclick="location.reload()" class="w-10 h-10 rounded-xl border border-[#222] bg-[#111] flex items-center justify-center text-gray-500 hover:text-white hover:border-theme transition-all cursor-pointer">
                    <i class="fas fa-sign-out-alt text-sm"></i>
                </div>
            </div>

            <div class="px-6 py-2 fade-in-up" style="animation-delay: 0.1s;">
                <div id="memberCard" class="premium-card card-border-glow p-7 flex flex-col justify-between">
                    <div class="flex justify-between items-start z-10">
                        <i class="fas fa-wifi rotate-90 text-[#444] text-lg opacity-60"></i>
                        <span id="memberTierText" class="text-theme-grad font-extrabold text-[11px] tracking-widest uppercase px-3 py-1 bg-black/40 border border-[#333] rounded-full shadow-lg transition-colors duration-500 font-outfit">Standard</span>
                    </div>
                    
                    <div class="z-10 mt-1">
                        <div class="flex items-center gap-2 mb-1 opacity-60">
                            <span class="text-[9px] text-gray-300 uppercase tracking-[3px] font-medium">TOTAL PORTFOLIO VALUE</span>
                        </div>
                        <h1 class="text-[42px] font-extrabold text-white tracking-tighter leading-none font-outfit" id="userBalance">0.00</h1>
                        <p class="text-xs text-theme font-medium mt-1 tracking-wider transition-colors duration-500 font-outfit opacity-90">THB ASSETS</p>
                    </div>

                    <div class="flex justify-between items-end z-10">
                        <div>
                            <p id="userAccNo" class="font-mono text-gray-400 text-[10px] tracking-[2px] mb-1">0000 0000</p>
                            <p id="userFullName" class="text-[10px] text-[#666] uppercase tracking-wider font-semibold truncate w-40">...</p>
                        </div>
                        <div class="opacity-20 text-3xl">
                             <i class="fab fa-cc-mastercard text-white"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex-1 mt-6 glass-sheet flex flex-col overflow-hidden fade-in-up shadow-2xl" style="animation-delay: 0.3s;">
                <div class="px-8 py-5 flex justify-between items-center border-b border-white/5">
                    <h3 class="text-white text-base font-light font-outfit">RECENT MOVEMENTS</h3>
                    <div class="w-2.5 h-2.5 rounded-full bg-theme shadow-theme transition-all duration-500 opacity-80 animate-pulse"></div>
                </div>
                
                <div id="txList" class="flex-1 overflow-y-auto px-6 pt-2 space-y-0 no-scrollbar">
                    </div>

                <div class="p-4 text-center border-t border-white/5 bg-[#080808]">
                    <p class="text-[9px] text-[#444] uppercase tracking-widest font-semibold font-outfit">
                        พัฒนาโดย พระมหาจักรภัทร คมฺภีรญาณเมธี
                    </p>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiCtKW-U5QWp3yUsvToJlh2pT7sjiQ4Iw",
            authDomain: "taebankwat.firebaseapp.com",
            databaseURL: "https://taebankwat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "taebankwat",
            storageBucket: "taebankwat.firebasestorage.app",
            messagingSenderId: "134684838871",
            appId: "1:134684838871:web:4b47416599ed4ce95c5992"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentPin = "";
        let members = [];
        let txs = [];

        // HIDE ADDRESS BAR ON IOS
        window.addEventListener("load",function() { setTimeout(function(){ window.scrollTo(0, 1); }, 0); });

        onValue(ref(db, 'members'), s => members = s.val() ? Object.values(s.val()) : []);
        onValue(ref(db, 'transactions'), s => txs = s.val() ? Object.values(s.val()) : []);

        window.pressKey = (n) => {
            if(currentPin.length < 6) {
                currentPin += n;
                updateDots();
                if(currentPin.length === 6) setTimeout(processLogin, 250);
            }
        };

        window.deleteKey = () => { currentPin = currentPin.slice(0, -1); updateDots(); };

        function updateDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => i < currentPin.length ? d.classList.add('active') : d.classList.remove('active'));
        }

        // --- PRESTIGE DYNAMIC THEME SYSTEM ---
        function applyPrestigeTheme(bal) {
            let primary, gradient, tierName, glow, particleOpacity;

            if (bal < 200) {
                // Silver / Standard (Brushed Metal)
                primary = '#B0BEC5'; 
                gradient = 'linear-gradient(135deg, #78909C, #CFD8DC, #B0BEC5)'; 
                tierName = 'Silver Standard';
                glow = '0 0 15px rgba(176, 190, 197, 0.4)';
            } else if (bal < 300) {
                // Bronze (Warm Metal)
                primary = '#CD7F32'; 
                gradient = 'linear-gradient(135deg, #8C5220, #E4A05F, #CD7F32)'; 
                tierName = 'Bronze Prestige';
                glow = '0 0 15px rgba(205, 127, 50, 0.4)';
            } else if (bal < 400) {
                // Copper/Rose (Modern Luxury)
                primary = '#E87A5D'; 
                gradient = 'linear-gradient(135deg, #B85333, #F2A68D, #E87A5D)'; 
                tierName = 'Copper Elite';
                glow = '0 0 15px rgba(232, 122, 93, 0.4)';
            } else if (bal < 500) {
                // Emerald (Gemstone Depth)
                primary = '#50C878'; 
                gradient = 'linear-gradient(135deg, #2E8B57, #98FB98, #50C878)'; 
                tierName = 'Emerald Vault';
                glow = '0 0 20px rgba(80, 200, 120, 0.5)';
            } else if (bal < 1000) {
                // Sapphire (Royal Blue)
                primary = '#4169E1'; 
                gradient = 'linear-gradient(135deg, #0000CD, #87CEEB, #4169E1)'; 
                tierName = 'Sapphire Royal';
                glow = '0 0 20px rgba(65, 105, 225, 0.5)';
            } else if (bal < 2000) {
                // Amethyst (Rare Violet)
                primary = '#9966CC'; 
                gradient = 'linear-gradient(135deg, #4B0082, #DDA0DD, #9966CC)'; 
                tierName = 'Amethyst Private';
                glow = '0 0 20px rgba(153, 102, 204, 0.5)';
            } else if (bal < 5000) {
                // Platinum (Ultimate Silver)
                primary = '#E5E4E2'; 
                gradient = 'linear-gradient(135deg, #A9A9A9, #FFFFFF, #E5E4E2)'; 
                tierName = 'Platinum Portfolio';
                glow = '0 0 25px rgba(255, 255, 255, 0.3)';
            } else if (bal < 10000) {
                // Gold (Classic Wealth)
                primary = '#D4AF37'; 
                gradient = 'linear-gradient(135deg, #BF953F, #FCF6BA, #B38728)'; 
                tierName = 'Gold Reserve';
                glow = '0 0 30px rgba(212, 175, 55, 0.6)';
            } else {
                // Diamond Elite (10000+) Cyber Luxury
                primary = '#00FFFF'; 
                gradient = 'linear-gradient(135deg, #008B8B, #E0FFFF, #00FFFF)'; 
                tierName = 'Diamond Asset Elite';
                glow = '0 0 40px rgba(0, 255, 255, 0.7)';
            }

            // Apply to CSS Variables (Dynamic Tailwind)
            document.documentElement.style.setProperty('--theme-primary', primary);
            document.documentElement.style.setProperty('--theme-gradient', gradient);
            document.documentElement.style.setProperty('--theme-glow', glow);
            
            // Update Text in Card
            document.getElementById('memberTierText').innerText = tierName;

            // Move ambient glow based on tier power (higher bal = centered glow)
            const flare = document.getElementById('dynamicFlare');
            if(bal >= 5000) {
                flare.style.top = '50%'; flare.style.left = '50%'; flare.style.transform = 'translate(-50%, -50%)';
                flare.style.opacity = '0.08';
            } else {
                flare.style.top = '-10%'; flare.style.right = '-10%'; flare.style.transform = 'none';
                flare.style.opacity = '0.03';
            }
        }

        function processLogin() {
            const user = members.find(m => m.code === currentPin);
            if(user) {
                // 1. Calculate Balance First to set Theme
                const userTx = txs.filter(t => t.studentCode === user.code);
                let bal = 0;
                userTx.forEach(t => bal += (t.type === 'deposit' ? parseFloat(t.amount) : -parseFloat(t.amount)));
                
                // 2. APPLY MAJESTIC THEME!
                applyPrestigeTheme(bal);

                // 3. System Transition
                document.getElementById('loginScreen').classList.add('hidden');
                const bio = document.getElementById('bioScan');
                bio.classList.remove('hidden'); bio.classList.add('flex');
                
                setTimeout(() => {
                    bio.classList.add('hidden');
                    document.getElementById('dashboardScreen').classList.remove('hidden');
                    loadData(user, bal, userTx);
                }, 1800); 
            } else {
                currentPin = ""; updateDots();
                Swal.fire({
                    background: '#111', color: '#fff',
                    icon: 'error', title: 'ACCESS DENIED', confirmButtonColor: '#ff4444',
                    customClass: { popup: 'border border-red-500 rounded-3xl' }
                });
            }
        }

        function loadData(user, bal, userTx) {
            // Sort history desc
            userTx.sort((a,b) => new Date(b.date) - new Date(a.date));

            document.getElementById('userNick').innerText = user.nick;
            document.getElementById('userFullName').innerText = user.name || user.nick;
            document.getElementById('userAccNo').innerText = user.code.replace(/(\d{3})(\d{3})/, '$1 $2');
            
            // Large Balance Counter
            animateValue('userBalance', 0, bal, 1500);

            // History Injected with Glass Styling
            const list = document.getElementById('txList');
            list.innerHTML = userTx.length ? '' : '<p class="text-center text-[#333] mt-16 font-light text-sm tracking-widest font-outfit">NO ASSET MOVEMENTS FOUND</p>';
            
            userTx.forEach((t, index) => {
                const isDep = t.type === 'deposit';
                const date = new Date(t.date);
                list.innerHTML += `
                    <div class="flex justify-between items-center py-5 border-b border-white/5 hover:bg-white/5 transition-all px-2 rounded-xl">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center ${isDep?'bg-green-500/10 text-green-500':'bg-red-500/10 text-red-500'} border border-white/5 shadow-inner">
                                <i class="fas ${isDep?'fa-arrow-down':'fa-arrow-up'} text-xs"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-200 font-bold tracking-wide font-outfit uppercase">${isDep?'Incoming':'Outgoing'}</p>
                                <p class="text-[10px] text-[#555] mt-0.5 font-mono uppercase">${date.toLocaleDateString('th-TH')} • ${date.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}</p>
                            </div>
                        </div>
                        <p class="font-extrabold ${isDep?'text-green-400':'text-red-400'} text-xl tracking-wide font-outfit">${isDep?'+':'-'} ${parseFloat(t.amount).toLocaleString()}</p>
                    </div>
                `;
            });
        }

        // Animated Counter for Balance
        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentVal = (progress * (end - start) + start);
                // Formatting for decimal points on prestige apps
                obj.innerHTML = currentVal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
