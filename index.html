<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TaeBank - Exclusive Wealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Prompt:wght@200;300;400;500&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* --- EXCLUSIVE LUXURY VARIABLES --- */
        :root {
            --bg-obsidian: #050505;
            --surface-dark: #0f0f11;
            --theme-color: #D4AF37; /* Default Gold */
            --theme-metal: linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            --card-surface: linear-gradient(145deg, #181818 0%, #000000 100%);
            --theme-glow: rgba(212, 175, 55, 0.15);
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-obsidian);
            color: #e0e0e0;
            height: 100dvh; 
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            /* Noise texture for premium matte look */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        }

        .font-serif-lux { font-family: 'Cinzel', serif; }
        .font-num { font-family: 'Outfit', sans-serif; }

        /* --- THEME APPLY CLASSES --- */
        .text-metal {
            background: var(--theme-metal);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .bg-metal { background: var(--theme-metal); }
        .border-metal { border-color: var(--theme-color); }

        /* --- KEYPAD (Minimalist Invisible Buttons) --- */
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 280px; margin: 0 auto; }
        .key-btn {
            width: 100%; height: 75px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 300; font-family: 'Outfit', sans-serif;
            color: #ffffff;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        /* Subtle Light Sweep on press */
        .key-btn::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
            background: radial-gradient(circle, var(--theme-color) 0%, transparent 70%);
            opacity: 0; transform: translate(-50%, -50%); transition: 0.2s;
        }
        .key-btn:active::after { width: 150px; height: 150px; opacity: 0.3; transition: 0s; }
        .key-btn:active { transform: scale(0.95); color: var(--theme-color); }

        /* --- PIN INDICATORS --- */
        .pin-line { width: 18px; height: 2px; background: #333; transition: 0.4s; border-radius: 2px; }
        .pin-line.active { background: var(--theme-color); box-shadow: 0 0 10px var(--theme-glow); transform: scaleX(1.2); }

        /* --- THE BLACK CARD (Physical Realism) --- */
        .lux-card {
            aspect-ratio: 1.586/1;
            background: var(--card-surface);
            border-radius: 16px;
            position: relative; overflow: hidden;
            box-shadow: 0 30px 60px -10px rgba(0,0,0,1), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 1s ease;
        }
        /* Metallic Foil Edge */
        .lux-card::before {
            content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 1px;
            background: var(--theme-metal);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; opacity: 0.7;
        }
        /* Holographic Light Sweep */
        .lux-card::after {
            content: ''; position: absolute; top: -150%; left: -150%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 45%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0.1) 55%, transparent 60%);
            transform: rotate(30deg);
            animation: luxuryShine 7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            pointer-events: none;
        }
        @keyframes luxuryShine { 0% { top: -150%; left: -150%; } 20% { top: 100%; left: 100%; } 100% { top: 100%; left: 100%; } }

        /* Card Chip Realism */
        .emv-chip {
            width: 38px; height: 28px;
            background: linear-gradient(135deg, #e6c27a 0%, #c49a45 100%);
            border-radius: 4px; position: relative;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .emv-chip::before {
            content: ''; position: absolute; inset: 2px;
            border: 1px solid rgba(0,0,0,0.2); border-radius: 2px;
            background-image: 
                linear-gradient(90deg, transparent 45%, rgba(0,0,0,0.2) 45%, rgba(0,0,0,0.2) 55%, transparent 55%),
                linear-gradient(0deg, transparent 45%, rgba(0,0,0,0.2) 45%, rgba(0,0,0,0.2) 55%, transparent 55%);
        }

        /* --- LIST & UI --- */
        .tx-list-container {
            background: var(--surface-dark);
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        /* Smooth fade-ins */
        .fade-lux { animation: luxFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes luxFade { to { opacity: 1; transform: translateY(0); } }

        /* Loader */
        .lux-loader {
            width: 100px; height: 1px; background: #222; position: relative; overflow: hidden; margin: 0 auto;
        }
        .lux-loader::after {
            content: ''; position: absolute; top: 0; left: -50px; width: 50px; height: 100%;
            background: var(--theme-metal);
            animation: scanLoad 1.5s ease-in-out infinite;
        }
        @keyframes scanLoad { 0% { left: -50px; } 100% { left: 100px; } }

    </style>
</head>
<body class="flex flex-col items-center justify-center">

    <div class="w-full h-full max-w-[400px] mx-auto relative flex flex-col">

        <div id="loginScreen" class="absolute inset-0 z-30 flex flex-col justify-between transition-all duration-1000 bg-[var(--bg-obsidian)]">
            
            <div class="flex-1 flex flex-col items-center justify-center pb-10">
                <div class="mb-8 relative flex flex-col items-center">
                    <div class="w-12 h-12 border border-[#444] rounded-full flex items-center justify-center mb-4 relative">
                        <div class="w-8 h-8 border border-theme rounded-full opacity-50 absolute animate-pulse"></div>
                        <i class="fas fa-gem text-lg text-metal"></i>
                    </div>
                    <h1 class="text-3xl font-serif-lux tracking-[8px] text-white uppercase ml-2">TaeBank</h1>
                    <p class="text-[8px] text-[#666] font-num tracking-[5px] mt-2 uppercase">Exclusive Wealth</p>
                </div>

                <div class="flex gap-4 mt-8">
                    <div class="pin-line"></div><div class="pin-line"></div><div class="pin-line"></div>
                    <div class="pin-line"></div><div class="pin-line"></div><div class="pin-line"></div>
                </div>
            </div>

            <div class="w-full pb-12 px-6">
                <div class="keypad-grid mb-6">
                    <div class="key-btn" onclick="pressKey('1')">1</div><div class="key-btn" onclick="pressKey('2')">2</div><div class="key-btn" onclick="pressKey('3')">3</div>
                    <div class="key-btn" onclick="pressKey('4')">4</div><div class="key-btn" onclick="pressKey('5')">5</div><div class="key-btn" onclick="pressKey('6')">6</div>
                    <div class="key-btn" onclick="pressKey('7')">7</div><div class="key-btn" onclick="pressKey('8')">8</div><div class="key-btn" onclick="pressKey('9')">9</div>
                    <div></div><div class="key-btn" onclick="pressKey('0')">0</div>
                    <div class="key-btn text-[#555] active:text-white" onclick="deleteKey()"><i class="fas fa-times text-lg"></i></div>
                </div>
                
                <p class="text-center text-[8px] text-[#444] font-serif-lux tracking-widest uppercase opacity-70">
                    Developed by พระมหาจักรภัทร คมฺภีรญาณเมธี
                </p>
            </div>
        </div>

        <div id="bioScan" class="absolute inset-0 z-40 bg-[var(--bg-obsidian)] flex flex-col items-center justify-center hidden">
            <h2 class="font-serif-lux text-theme text-xl tracking-[6px] mb-6 uppercase">Authenticating</h2>
            <div class="lux-loader"></div>
            <p id="authText" class="mt-8 font-num text-[#555] tracking-[3px] text-[9px] uppercase">Retrieving Portfolio...</p>
        </div>

        <div id="dashboardScreen" class="hidden w-full h-full flex flex-col relative z-20">
            
            <div class="pt-14 px-8 pb-6 flex justify-between items-center">
                <div class="fade-lux" style="animation-delay: 0.1s;">
                    <p class="font-serif-lux text-[#666] text-[9px] tracking-[3px] uppercase mb-1">Portfolio Owner</p>
                    <h2 id="userNick" class="text-2xl font-light text-white tracking-wide">...</h2>
                </div>
                <div onclick="location.reload()" class="fade-lux w-8 h-8 rounded-full flex items-center justify-center text-[#555] hover:text-white transition-colors cursor-pointer" style="animation-delay: 0.2s;">
                    <i class="fas fa-lock text-xs"></i>
                </div>
            </div>

            <div class="px-6 py-2 fade-lux" style="animation-delay: 0.3s;">
                <div id="memberCard" class="lux-card p-6 flex flex-col justify-between">
                    
                    <div class="flex justify-between items-start z-10">
                        <div class="emv-chip"></div>
                        <i class="fas fa-wifi rotate-90 text-[#555] text-sm opacity-50"></i>
                    </div>
                    
                    <div class="z-10 mt-6 mb-2">
                        <h1 class="text-[38px] font-num font-light text-white tracking-tight leading-none" id="userBalance">0.00</h1>
                        <p class="text-[9px] font-serif-lux text-theme tracking-[4px] mt-2 uppercase">THB Available Asset</p>
                    </div>

                    <div class="flex justify-between items-end z-10">
                        <div>
                            <p id="userFullName" class="text-[9px] font-num text-[#888] uppercase tracking-[2px] font-medium truncate w-40 mb-1">...</p>
                            <p id="userAccNo" class="font-num text-[#555] text-[10px] tracking-[4px]">0000 0000</p>
                        </div>
                        <div class="text-right">
                            <span id="memberTierText" class="font-serif-lux text-metal font-bold text-[10px] tracking-[3px] uppercase">Standard</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tx-list-container flex-1 mt-8 flex flex-col overflow-hidden fade-lux rounded-t-3xl" style="animation-delay: 0.5s;">
                <div class="px-8 py-6 flex justify-between items-center">
                    <h3 class="font-serif-lux text-[#aaa] text-xs tracking-[3px] uppercase">Recent Ledger</h3>
                    <i class="fas fa-sliders-h text-[#444] text-xs"></i>
                </div>
                
                <div id="txList" class="flex-1 overflow-y-auto px-6 space-y-0 no-scrollbar pb-6">
                    </div>

                <div class="p-5 text-center bg-[var(--surface-dark)]">
                    <p class="text-[8px] text-[#444] font-serif-lux tracking-[4px] uppercase">
                        Developed by พระมหาจักรภัทร คมฺภีรญาณเมธี
                    </p>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiCtKW-U5QWp3yUsvToJlh2pT7sjiQ4Iw",
            authDomain: "taebankwat.firebaseapp.com",
            databaseURL: "https://taebankwat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "taebankwat",
            storageBucket: "taebankwat.firebasestorage.app",
            messagingSenderId: "134684838871",
            appId: "1:134684838871:web:4b47416599ed4ce95c5992"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentPin = "";
        let members = [];
        let txs = [];

        onValue(ref(db, 'members'), s => members = s.val() ? Object.values(s.val()) : []);
        onValue(ref(db, 'transactions'), s => txs = s.val() ? Object.values(s.val()) : []);

        window.pressKey = (n) => {
            if(currentPin.length < 6) {
                currentPin += n;
                updateDots();
                if(currentPin.length === 6) setTimeout(processLogin, 200);
            }
        };

        window.deleteKey = () => { currentPin = currentPin.slice(0, -1); updateDots(); };

        function updateDots() {
            const dots = document.querySelectorAll('.pin-line');
            dots.forEach((d, i) => i < currentPin.length ? d.classList.add('active') : d.classList.remove('active'));
        }

        // --- ULTRA LUXURY TIER SYSTEM ---
        function applyLuxuryTier(bal) {
            let color, metalGrad, tierName, surface;

            if (bal < 200) {
                color = '#A0AAB2'; 
                metalGrad = 'linear-gradient(135deg, #78858F, #C4CED4, #A0AAB2, #E8ECEF, #5D6870)';
                tierName = 'Silver Slate';
                surface = 'linear-gradient(145deg, #2a2a2d 0%, #111112 100%)';
            } else if (bal < 300) {
                color = '#B87333'; 
                metalGrad = 'linear-gradient(135deg, #8A4B1A, #D6975A, #B87333, #FAD6A5, #63320B)';
                tierName = 'Bronze Reserve';
                surface = 'linear-gradient(145deg, #261c14 0%, #0d0905 100%)';
            } else if (bal < 400) {
                color = '#B76E79'; // Rose Gold
                metalGrad = 'linear-gradient(135deg, #8C4753, #D99AAB, #B76E79, #FDE1E8, #6B303C)';
                tierName = 'Rose Gold Elite';
                surface = 'linear-gradient(145deg, #2b1f22 0%, #120b0d 100%)';
            } else if (bal < 500) {
                color = '#2E8B57'; // Deep Emerald
                metalGrad = 'linear-gradient(135deg, #164D2E, #62D18F, #2E8B57, #B4F5CE, #0B2B18)';
                tierName = 'Imperial Emerald';
                surface = 'linear-gradient(145deg, #13241a 0%, #050d08 100%)';
            } else if (bal < 1000) {
                color = '#0F52BA'; // Deep Sapphire
                metalGrad = 'linear-gradient(135deg, #05265C, #4F8CEB, #0F52BA, #ABCFFF, #021230)';
                tierName = 'Royal Sapphire';
                surface = 'linear-gradient(145deg, #0d1726 0%, #040811 100%)';
            } else if (bal < 2000) {
                color = '#5A4FCF'; // Deep Amethyst
                metalGrad = 'linear-gradient(135deg, #2D256B, #8A7DF5, #5A4FCF, #D2CDFF, #17123D)';
                tierName = 'Amethyst Sovereign';
                surface = 'linear-gradient(145deg, #191629 0%, #090812 100%)';
            } else if (bal < 5000) {
                color = '#E5E4E2'; // Platinum
                metalGrad = 'linear-gradient(135deg, #8A8987, #FFFFFF, #E5E4E2, #FFFFFF, #525250)';
                tierName = 'Platinum Crest';
                surface = 'linear-gradient(145deg, #2e2e2e 0%, #151515 100%)';
            } else if (bal < 10000) {
                color = '#D4AF37'; // Pure Gold
                metalGrad = 'linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C)';
                tierName = 'Aurum Prestige';
                surface = 'linear-gradient(145deg, #29210b 0%, #0f0b02 100%)';
            } else {
                // 10000+ Obsidian Diamond (The Ultimate Black Card)
                color = '#E0FFFF'; // Diamond white/cyan
                metalGrad = 'linear-gradient(135deg, #555555, #E0FFFF, #888888, #FFFFFF, #222222)';
                tierName = 'Obsidian Centurion';
                surface = 'linear-gradient(145deg, #0f0f0f 0%, #000000 100%)';
            }

            // Apply to CSS Variables
            document.documentElement.style.setProperty('--theme-color', color);
            document.documentElement.style.setProperty('--theme-metal', metalGrad);
            document.documentElement.style.setProperty('--card-surface', surface);
            document.documentElement.style.setProperty('--theme-glow', `rgba(${hexToRgb(color)}, 0.3)`);
            
            document.getElementById('memberTierText').innerText = tierName;
        }

        // Helper to convert hex to rgb for shadow opacity
        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '212, 175, 55';
        }

        function processLogin() {
            const user = members.find(m => m.code === currentPin);
            if(user) {
                const userTx = txs.filter(t => t.studentCode === user.code);
                let bal = 0;
                userTx.forEach(t => bal += (t.type === 'deposit' ? parseFloat(t.amount) : -parseFloat(t.amount)));
                
                // SET TIER
                applyLuxuryTier(bal);

                // Transition Logic
                document.getElementById('loginScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginScreen').classList.add('hidden');
                    const bio = document.getElementById('bioScan');
                    bio.classList.remove('hidden'); 
                    
                    setTimeout(() => {
                        bio.classList.add('hidden');
                        document.getElementById('dashboardScreen').classList.remove('hidden');
                        loadData(user, bal, userTx);
                    }, 2500); // Slower, more elegant loading
                }, 800);
            } else {
                currentPin = ""; updateDots();
                Swal.fire({
                    background: '#0a0a0a', color: '#fff',
                    title: '<span class="font-serif-lux text-xl uppercase tracking-widest text-[#D4AF37]">Access Denied</span>',
                    text: 'Invalid Credentials',
                    confirmButtonColor: '#333',
                    customClass: { popup: 'border border-[#333] rounded-xl' }
                });
            }
        }

        function loadData(user, bal, userTx) {
            userTx.sort((a,b) => new Date(b.date) - new Date(a.date));

            document.getElementById('userNick').innerText = user.nick;
            document.getElementById('userFullName').innerText = user.name || user.nick;
            // Format acc number: 000 000
            document.getElementById('userAccNo').innerText = user.code.replace(/(\d{3})(\d{3})/, '$1 $2');
            
            // Clean Counter
            animateValue('userBalance', 0, bal, 1500);

            const list = document.getElementById('txList');
            list.innerHTML = userTx.length ? '' : '<p class="text-center text-[#444] mt-12 font-serif-lux text-[10px] tracking-[3px] uppercase">No Ledger Entries</p>';
            
            userTx.forEach(t => {
                const isDep = t.type === 'deposit';
                const date = new Date(t.date);
                list.innerHTML += `
                    <div class="flex justify-between items-center py-4 border-b border-[#222]">
                        <div class="flex items-center gap-5">
                            <div class="text-[10px] ${isDep?'text-green-600':'text-red-900'}">
                                <i class="fas ${isDep?'fa-arrow-right':'fa-arrow-left'}"></i>
                            </div>
                            <div>
                                <p class="text-xs text-[#ccc] font-light tracking-wide font-num uppercase">${isDep?'Inward Remittance':'Outward Transfer'}</p>
                                <p class="text-[9px] text-[#555] mt-1 font-num uppercase tracking-wider">${date.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})}</p>
                            </div>
                        </div>
                        <p class="font-light ${isDep?'text-[#e0e0e0]':'text-[#888]'} text-lg font-num tracking-wide">${isDep?'+':'-'} ${parseFloat(t.amount).toLocaleString()}</p>
                    </div>
                `;
            });
        }

        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Ease out expo for elegant stopping
                const easeOut = 1 - Math.pow(1 - progress, 4);
                const currentVal = (easeOut * (end - start) + start);
                obj.innerHTML = currentVal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
